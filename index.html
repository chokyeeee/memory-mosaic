<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广技师12注会3 - 回忆拼图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#165DFF' } } }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <!-- 顶部标题 -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 text-center">
            <h1 class="text-[clamp(1.5rem,4vw,2rem)] font-bold text-primary">广技师12注会3</h1>
            <p class="text-gray-600">回忆拼图 · 共60个美好瞬间</p>
            <div class="mt-2 text-sm text-gray-500">
                <span id="uploadCount">已上传 0/60 张</span>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-6">
        <!-- 拼图容器 -->
        <div class="relative mb-6 overflow-auto bg-white rounded-lg shadow-md p-2">
            <!-- 背景图 -->
            <div class="absolute inset-0 z-0 opacity-30 transition-opacity duration-700" id="bgContainer">
                <img src="target.jpg" alt="背景图" class="w-full h-full object-cover">
            </div>
            
            <!-- 6×10拼图网格 -->
            <div class="puzzle-grid relative z-10" id="puzzleGrid"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="flex flex-col gap-3 mb-8">
            <button id="uploadBtn" class="bg-primary text-white py-3 px-6 rounded-lg font-medium flex items-center justify-center shadow hover:shadow-lg transition-all">
                <i class="fa fa-upload mr-2"></i> 上传照片（从中心开始）
            </button>
            <button id="resetBtn" class="bg-gray-200 text-gray-700 py-3 px-6 rounded-lg font-medium flex items-center justify-center hover:bg-gray-300 transition-all">
                <i class="fa fa-refresh mr-2"></i> 重置拼图
            </button>
        </div>
    </main>

    <!-- 图片预览弹窗 -->
    <div id="previewModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden">
        <div class="relative">
            <img id="previewImg" src="" alt="预览图片" class="max-h-[80vh] max-w-[90vw] rounded-lg">
            <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-4">
                <button id="replaceBtn" class="bg-primary text-white py-2 px-4 rounded-lg flex items-center">
                    <i class="fa fa-exchange mr-1"></i> 替换
                </button>
                <button id="deleteBtn" class="bg-red-500 text-white py-2 px-4 rounded-lg flex items-center">
                    <i class="fa fa-trash mr-1"></i> 删除
                </button>
                <button id="closePreview" class="bg-gray-600 text-white py-2 px-4 rounded-lg flex items-center">
                    <i class="fa fa-times mr-1"></i> 关闭
                </button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" class="hidden" accept="image/*">

    <script src="script.js"></script>
</body>
</html>
