<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广技师12注会3 - 回忆拼图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <header class="bg-white shadow-sm py-6 text-center">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">广技师12注会3</h1>
        <p class="text-gray-600 mb-1">上传你的大学回忆照片，一起拼成班级拼图</p>
        <p class="text-sm text-gray-500" id="uploadCount">已上传 0/60 张</p>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div class="relative rounded-lg overflow-hidden shadow-md mb-6">
            <!-- 背景图（底层） -->
            <div class="absolute inset-0 z-0" id="bgContainer" style="opacity: 0.4;">
                <img src="target.jpg" alt="背景图" class="w-full h-full object-cover">
            </div>
            <!-- 6×10拼图网格（上层） -->
            <div class="puzzle-grid relative z-10" id="puzzleGrid"></div>
        </div>

        <div class="flex flex-col gap-3 max-w-md mx-auto">
            <button id="uploadBtn" class="bg-blue-600 text-white py-3 px-6 rounded-lg font-medium flex items-center justify-center shadow hover:shadow-lg transition-all">
                <i class="fa fa-upload mr-2"></i> 上传照片（从中心开始）
            </button>
            <button id="resetBtn" class="bg-gray-200 text-gray-700 py-3 px-6 rounded-lg font-medium flex items-center justify-center hover:bg-gray-300 transition-all">
                <i class="fa fa-refresh mr-2"></i> 重置拼图
            </button>
        </div>
    </main>

    <!-- 预览弹窗 -->
    <div id="previewModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden">
        <div class="relative">
            <img id="previewImg" src="" alt="预览图片" class="max-h-[80vh] max-w-[90vw] rounded-lg">
            <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-4">
                <button id="replaceBtn" class="bg-blue-600 text-white py-2 px-4 rounded-lg flex items-center">
                    <i class="fa fa-exchange mr-1"></i> 替换
                </button>
                <button id="deleteBtn" class="bg-red-500 text-white py-2 px-4 rounded-lg flex items-center">
                    <i class="fa fa-trash mr-1"></i> 删除
                </button>
                <button id="closePreview" class="bg-gray-600 text-white py-2 px-4 rounded-lg flex items-center">
                    <i class="fa fa-times mr-1"></i> 关闭
                </button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="image/*">
    <script src="script.js"></script>
</body>
</html>
